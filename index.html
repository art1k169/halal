<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ишак или Свин</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial Black', sans-serif;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .animal-btn {
            padding: 50px 70px;
            font-size: 2.5rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: white;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        /* ИШАК */
        .donkey-btn {
            background: #5d4037;
            box-shadow: 0 10px #3e2723;
        }

        .donkey-btn:active {
            box-shadow: 0 2px #3e2723;
            transform: translateY(8px);
        }

        /* СВИН */
        .pig-btn {
            background: #ff80ab;
            box-shadow: 0 10px #c51162;
        }

        .pig-btn:active {
            box-shadow: 0 2px #c51162;
            transform: translateY(8px);
        }
    </style>
</head>
<body>

    <h1>ВЫБЕРИ КТО ТЫ</h1>

    <div class="btn-container">
        <button class="animal-btn donkey-btn" onclick="playDonkey()">ИШАК</button>
        <button class="animal-btn pig-btn" onclick="playPig()">СВИН</button>
    </div>

    <script>
        // Звуки в формате Base64 (встроены прямо в код)
        const donkeySnd = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="); 
        const pigSnd = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=");

        // Заменяем на рабочие ссылки, которые разрешают проигрывание
        // Если эти ссылки со временем упадут, лучше всего скачать mp3 файлы в папку с сайтом
        const donkeyUrl = "https://www.myinstants.com/media/sounds/donkey.mp3";
        const pigUrl = "https://www.myinstants.com/media/sounds/pig-oink-sound-effect.mp3";

        const audioDonkey = new Audio(donkeyUrl);
        const audioPig = new Audio(pigUrl);

        function playDonkey() {
            audioDonkey.currentTime = 0;
            audioDonkey.play().catch(e => {
                // Если браузер блокирует, пробуем альтернативный источник
                new Audio("https://actions.google.com/sounds/v1/animals/donkey_braying.ogg").play();
            });
        }

        function playPig() {
            audioPig.currentTime = 0;
            audioPig.play().catch(e => {
                new Audio("https://actions.google.com/sounds/v1/animals/pig_grunt.ogg").play();
            });
        }
    </script>
</body>
</html>
