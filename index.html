<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ишак или Свин?</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            padding: 50px 70px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s;
            text-align: center;
        }

        /* Ишак */
        .donkey {
            background: #546e7a;
            box-shadow: 0 10px 0 #263238;
        }

        /* Свин */
        .pig {
            background: #f06292;
            box-shadow: 0 10px 0 #880e4f;
        }

        .card:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 transparent;
        }

        /* Тумблер */
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1e1e1e;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #333;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #4caf50;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .toggle-label {
            font-weight: bold;
            color: #bbb;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card donkey" onclick="play('donkey')">ИШАК</div>
        <div class="card pig" onclick="play('pig')">СВИН</div>
    </div>

    <div class="toggle-container">
        <span class="toggle-label">РАЗНЫЕ ИНТОНАЦИИ</span>
        <label class="switch">
            <input type="checkbox" id="pitch-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        // Подключаем твои локальные файлы
        const sounds = {
            donkey: new Audio('ишак.mp3'),
            pig: new Audio('свинко.mp3')
        };

        function play(animal) {
            const audio = sounds[animal];
            const isRandomPitch = document.getElementById('pitch-toggle').checked;

            // Сброс звука в начало
            audio.pause();
            audio.currentTime = 0;

            if (isRandomPitch) {
                // Генерируем случайный тон от 0.5 (низкий) до 2.0 (высокий писклявый)
                const randomPitch = Math.random() * (2.0 - 0.5) + 0.5;
                audio.playbackRate = randomPitch;
            } else {
                // Обычный тон
                audio.playbackRate = 1.0;
            }

            audio.play();
        }
    </script>

</body>
</html>
