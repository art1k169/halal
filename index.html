<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбери зверя</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            color: white;
        }

        h1 {
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            display: flex;
            gap: 30px;
        }

        .card {
            padding: 40px 60px;
            font-size: 2.5rem;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            text-align: center;
            min-width: 200px;
        }

        /* Ишак */
        .donkey {
            background: linear-gradient(145deg, #6e6e6e, #828282);
            box-shadow: 0 10px 0 #444, 0 15px 20px rgba(0,0,0,0.5);
        }

        /* Свин */
        .pig {
            background: linear-gradient(145deg, #ff85b3, #ffadc2);
            box-shadow: 0 10px 0 #d6608a, 0 15px 20px rgba(0,0,0,0.5);
        }

        .card:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #333;
        }

        .pig:active {
            box-shadow: 0 2px 0 #9e4665;
        }
    </style>
</head>
<body>

    <h1>Кто ты?</h1>

    <div class="container">
        <div class="card donkey" onclick="playSound('donkey')">ИШАК</div>
        <div class="card pig" onclick="playSound('pig')">СВИН</div>
    </div>

    <audio id="donkey-sound" src="https://upload.wikimedia.org/wikipedia/commons/e/e3/Donkey_braying.ogg"></audio>
    <audio id="pig-sound" src="https://www.myinstants.com/media/sounds/pig-oink-sound-effect.mp3"></audio>

    <script>
        function playSound(animal) {
            const donkeyAudio = document.getElementById('donkey-sound');
            const pigAudio = document.getElementById('pig-sound');
            
            // Останавливаем оба звука перед запуском нового
            donkeyAudio.pause();
            pigAudio.pause();
            donkeyAudio.currentTime = 0;
            pigAudio.currentTime = 0;

            if (animal === 'donkey') {
                donkeyAudio.play().catch(e => console.log("Нужен клик по странице"));
            } else if (animal === 'pig') {
                pigAudio.play().catch(e => console.log("Нужен клик по странице"));
            }
        }
    </script>

</body>
</html>
